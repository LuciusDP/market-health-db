name: Daily Market Health

on:
  schedule:
    # Four daily refreshes. GitHub cron is UTC; during UK summer time these are
    # 07:00, 12:00, 16:00, and 20:00 London time.
    - cron: "0 6,11,15,19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate market health outputs
        run: python scripts/generate_market_health.py

      - name: Commit generated outputs
        run: |
          git config user.name "market-health-bot"
          git config user.email "market-health-bot@users.noreply.github.com"
          git add README.md data/ dashboard/
          git commit -m "Update daily market health outputs" || echo "No changes"
          git push
